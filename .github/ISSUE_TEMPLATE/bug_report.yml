name: Bug Report
description: Report something that isn't working correctly
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue. Fill out the sections below so this can be reproduced and fixed.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: What part of the plugin is affected?
      options:
        - Skill (slash command)
        - MCP Server / MCP Tool
        - Project Type / Knowledge Template
        - Python Tool (db, projects, contacts, notes, session)
        - Configuration / Setup
        - CLAUDE.md Instructions
    validations:
      required: true

  - type: dropdown
    id: skill
    attributes:
      label: Which skill? (if applicable)
      description: If this involves a specific skill, which one?
      options:
        - /project-hub:new-project
        - /project-hub:resume
        - /project-hub:dashboard
        - /project-hub:status
        - /project-hub:add-contact
        - /project-hub:add-note
        - /project-hub:edit-note
        - /project-hub:compose
        - /project-hub:summarize
        - /project-hub:search
        - /project-hub:knowledge
        - /project-hub:session-start
        - /project-hub:next-step
        - /project-hub:configure
        - /project-hub:type-creator
        - /project-hub:report
        - /project-hub:help
        - /project-hub:setup
        - Other (specify in description)
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the issue
      placeholder: When adding a contact, the MCP tool returns an error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can this be reproduced?
      placeholder: |
        1. Load a project with /project-hub:resume
        2. Run /project-hub:add-contact
        3. Observe error
    validations:
      required: true

  - type: input
    id: claude-model
    attributes:
      label: Claude model
      description: Which Claude model were you using?
      placeholder: claude-sonnet-4-6
    validations:
      required: false

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      description: Version from `.claude-plugin/plugin.json` or `git rev-parse --short HEAD`
      placeholder: 2.1.0 or abc1234
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or conversation excerpts
      description: Paste any error messages or relevant Claude conversation
      render: text
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context that might help
    validations:
      required: false
