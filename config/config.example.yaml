# Project Hub Configuration
# Copy to ~/.project-hub/config.yaml and adjust to your needs

# Directory where project docs folders are stored
# Each project gets a subfolder: {docs_root}/{project-slug}/docs/
docs_root: ~/Documents/project-hub

# Database location (SQLite)
# Default: ~/.project-hub/project-hub.db
#
# SHARED / TEAM USE: Point multiple users to the same file on a network share,
# NFS mount, Samba share, or cloud-synced folder (Dropbox, NAS, etc.).
# WAL mode supports concurrent reads; write conflicts are handled with
# automatic retries. Low-concurrency teams (2-5 users) work reliably.
#
# Examples:
#   db_path: ~/.project-hub/project-hub.db            # default (local)
#   db_path: /mnt/nas/team-hub/project-hub.db         # NFS / NAS
#   db_path: ~/Dropbox/project-hub/project-hub.db     # Dropbox
#   db_path: /mnt/smb/shared/project-hub/project-hub.db  # Samba
#
# WARNING: Real-time conflict detection is NOT supported in Phase 1.
#   Two simultaneous writes may produce SQLITE_BUSY — the plugin retries
#   automatically, but avoid heavy concurrent writes.
#
# db_path: ~/.project-hub/project-hub.db

# Knowledge base root (governance docs, process SOPs, role matrices per project type)
# Default: ~/.project-hub/knowledge/
# knowledge_root: ~/.project-hub/knowledge

# Your identity (used in communication drafts as sender context)
user:
  name: "Your Name"
  email: "you@example.com"
  organization: "Your Organization"

# Default language for generated communications
# Options: de (German), en (English)
default_language: en

# Communication preferences
communication:
  # Default sign-off for emails
  email_signature: |
    Best regards,
    {user.name}
  # Preferred tone: professional | friendly | formal
  default_tone: professional
